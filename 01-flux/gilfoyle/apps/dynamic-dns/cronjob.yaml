apiVersion: batch/v1
kind: CronJob
metadata:
  name: freedns-updater
  namespace: freedns
spec:
  schedule: "*/30 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: updater
            image: curlimages/curl:latest
            imagePullPolicy: IfNotPresent
            command: ["/bin/sh", "-c"]
            args:
              - |
                DOMAIN="homelab.themiple.ru"

                MY_IP=$(curl -s ifconfig.me)
                echo "Detected public IP: $MY_IP"

                # Resolve current DNS record for the domain
                CURRENT_IP=$(getent hosts "$DOMAIN" | awk '{print $1}')
                if [ -z "$CURRENT_IP" ]; then
                  echo "WARNING: Could not resolve $DOMAIN via getent, trying nslookup..."
                  CURRENT_IP=$(nslookup "$DOMAIN" 2>/dev/null | awk '/^Address: / { print $2 }' | tail -1)
                fi
                echo "DNS currently resolves to: $CURRENT_IP"

                if [ "$MY_IP" = "$CURRENT_IP" ]; then
                  echo "IP unchanged, skipping update"
                  exit 0
                fi

                echo "IP changed from $CURRENT_IP to $MY_IP, updating freedns..."
                curl -XGET -vk -u "${FREEDNS_USER}:${FREEDNS_PASS}" \
                  "https://freedns.afraid.org/nic/update?hostname=${DOMAIN}&myip=${MY_IP}"
            env:
            - name: DOMAIN
              value: "homelab.themiple.ru"
            - name: FREEDNS_USER
              valueFrom:
                secretKeyRef:
                  name: freedns-secret
                  key: username
            - name: FREEDNS_PASS
              valueFrom:
                secretKeyRef:
                  name: freedns-secret
                  key: password
          restartPolicy: OnFailure

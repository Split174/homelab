apiVersion: apps/v1
kind: Deployment
metadata:
  name: homebox
  namespace: homebox
  labels:
    app: homebox
spec:
  replicas: 1
  strategy:
    type: Recreate 
  selector:
    matchLabels:
      app: homebox
  template:
    metadata:
      labels:
        app: homebox
    spec:
      containers:
        - name: homebox
          image: ghcr.io/sysadminsmedia/homebox:0.23.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7745
              name: http
          env:
            - name: HBOX_DATABASE_DRIVER
              value: "sqlite3"
            
            - name: HBOX_OIDC_ENABLED
              value: "true"
            - name: HBOX_OIDC_ISSUER_URL
              value: "https://pocketid.themiple.ru"
            - name: HBOX_OPTIONS_TRUST_PROXY
              value: "true"
            - name: HBOX_OIDC_VERIFY_EMAIL
              value: "false"
            - name: HBOX_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: homebox-oidc
                  key: client-id
            - name: HBOX_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: homebox-oidc
                  key: client-secret
          
          volumeMounts:
            - name: data
              mountPath: /data/
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: homebox-data
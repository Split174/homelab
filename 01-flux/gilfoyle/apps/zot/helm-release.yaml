---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
  namespace: zot
spec:
  releaseName: zot
  chart:
    spec:
      chart: zot
      version: "0.1.116"
      sourceRef:
        kind: HelmRepository
        name: zot
        namespace: zot
  interval: 15m
  timeout: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1
    mountConfig: true
    persistence: true
    pvc:
      storage: 20Gi
      storageClassName: local-path
      accessModes:
        - ReadWriteOnce
    strategy:
      type: Recreate
    service:
      type: ClusterIP
      port: 5000
    ingress:
      enabled: true
      className: haproxy
      path: /
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt"
      pathtype: Prefix
      hosts:
        - zot.themiple.ru
      tls:
        - secretName: zot-tls
          hosts:
            - zot.themiple.ru
    mountSecret: true
    configFiles:
      config.json: |-
        {
          "storage": {
            "rootDirectory": "/var/lib/registry"
          },
          "http": {
            "address": "0.0.0.0",
            "port": "5000",
            "readTimeout": "300s",
            "writeTimeout": "300s",
            "compat": ["docker2s2"],
            "auth": {
              "htpasswd": {
                "path": "/secret/htpasswd"
              }
            },
            "accessControl": {
              "repositories": {
                "**": {
                  "defaultPolicy": []
                }
              },
              "adminPolicy": {
                "users": ["admin"],
                "actions": ["read", "create", "update", "delete"]
              }
            }
          },
          "log": {
            "level": "info"
          }
        }

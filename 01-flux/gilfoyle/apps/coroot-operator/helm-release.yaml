---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coroot-operator
  namespace: coroot
spec:
  releaseName: coroot-operator
  chart:
    spec:
      chart: coroot-operator
      sourceRef:
        kind: HelmRepository
        name: coroot
        namespace: coroot
  interval: 15m
  timeout: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values: {}

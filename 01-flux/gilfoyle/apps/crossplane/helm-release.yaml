apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crossplane
  namespace: crossplane-system
spec:
  releaseName: crossplane
  chartRef:
    kind: HelmChart
    name: crossplane
    namespace: crossplane-system
  interval: 15m
  timeout: 5m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    provider:
      packages:
        - xpkg.upbound.io/crossplane-contrib/provider-ansible:v0.8.0

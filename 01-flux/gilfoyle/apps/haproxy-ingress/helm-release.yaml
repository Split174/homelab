apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: haproxy-ingress
  namespace: haproxy-ingress
spec:
  releaseName: haproxy-ingress
  chart:
    spec:
      chart: haproxy-ingress
      version: "0.15.1"
      sourceRef:
        kind: HelmRepository
        name: haproxy-ingress
        namespace: haproxy-ingress
  interval: 15m
  timeout: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  # Defaults: values.yaml https://github.com/haproxy-ingress/charts/blob/release-0.15/haproxy-ingress/values.yaml
  values:
    controller:
      kind: DaemonSet
      logs:
        enabled: true
      ingressClassResource:
        enabled: true
        default: true
      service:
        type: NodePort
        externalTrafficPolicy: Local
        httpPorts:
          - port: 80
            targetPort: http
            nodePort: 30080
        httpsPorts:
          - port: 443
            targetPort: https
            nodePort: 30443
      defaultBackendService: honeypot/hellpot-service
      config:
        config-frontend: |
          stick-table type ip size 100k expire 24h store gpc0
          
          http-request track-sc0 req.hdr(X-Forwarded-For,-1) if { req.hdr(X-Forwarded-For) -m found }
          http-request track-sc0 src if !{ req.hdr(X-Forwarded-For) -m found }

          acl bad_paths path -m beg -i /.env /.git /.secrets /wp-admin /bitrix

          http-request sc-inc-gpc0(0) if bad_paths
          http-request tarpit deny_status 429 if { sc0_get_gpc0 gt 0 }
      stats:
        enabled: true
      metrics:
        enabled: true

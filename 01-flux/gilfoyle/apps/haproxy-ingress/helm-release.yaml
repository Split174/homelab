apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: haproxy-ingress
  namespace: haproxy-ingress
spec:
  releaseName: haproxy-ingress
  chart:
    spec:
      chart: haproxy-ingress
      version: "0.15.1"
      sourceRef:
        kind: HelmRepository
        name: haproxy-ingress
        namespace: haproxy-ingress
  interval: 15m
  timeout: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  # Defaults: values.yaml https://github.com/haproxy-ingress/charts/blob/release-0.15/haproxy-ingress/values.yaml
  values:
    controller:
      kind: DaemonSet
      logs:
        enabled: true
      ingressClassResource:
        enabled: true
        default: true
      service:
        type: NodePort
        externalTrafficPolicy: Local
        httpPorts:
          - port: 80
            targetPort: http
            nodePort: 30080
        httpsPorts:
          - port: 443
            targetPort: https
            nodePort: 30443
      defaultBackendService: honeypot/hellpot-service
      config:
        peers-table-global: |
          stick-table type ip size 1m expire 1h store gpc0
        config-frontend: |
          http-request track-sc0 src table peers-table-global if { path_beg /wp-admin/ }
          http-request deny deny_status 403 if { path_beg /wp-admin/ } { sc_get_gpc0(peers-table-global) gt 0 }   
      stats:
        enabled: true
      metrics:
        enabled: true
